<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Premium Number Guessing Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&display=swap');

  * { box-sizing: border-box; margin:0; padding:0; font-family: 'Roboto Mono', monospace; }

  body {
    background: radial-gradient(circle at top, #1a2a6c, #b21f1f, #fdbb2d);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    text-align: center;
    padding: 20px;
  }

  .container {
    background: rgba(0,0,0,0.7);
    padding: 30px 20px;
    border-radius: 25px;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease-in-out;
  }

  h1 {
    font-size: 2em;
    margin-bottom: 20px;
    letter-spacing: 1px;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
  }

  input[type="number"] {
    width: 70%;
    padding: 15px;
    font-size: 1.2em;
    border-radius: 15px;
    border: none;
    text-align: center;
    margin-bottom: 10px;
  }

  button {
    padding: 15px 30px;
    border-radius: 15px;
    border: none;
    font-weight: bold;
    font-size: 1.2em;
    cursor: pointer;
    transition: 0.3s;
    background: linear-gradient(45deg, #fdbb2d, #b21f1f);
    color: #fff;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    margin: 5px 0;
  }

  button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
  }

  #message {
    margin-top: 25px;
    font-size: 1.3em;
    min-height: 28px;
    font-weight: bold;
  }

  #attempts {
    margin-top: 10px;
    font-size: 1.1em;
    opacity: 0.9;
  }

  @keyframes fadeIn {
    from { opacity:0; transform: translateY(-20px); }
    to { opacity:1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🎯 Guess the Number!</h1>
  <input type="number" id="guessInput" placeholder="1 - 10" min="1" max="10">
  <br>
  <button onclick="checkGuess()">Guess</button>
  <button onclick="restartGame()">Restart Game 🔄</button>
  <div id="message"></div>
  <div id="attempts"></div>
</div>

<audio id="winSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<!-- <audio id="lowSound" src="https://actions.google.com/sounds/v1/cartoon/slide_whistle_up.ogg"></audio> -->
<audio id="highSound" src="https://actions.google.com/sounds/v1/cartoon/slide_whistle_down.ogg"></audio>
<audio id="laughSound" src="https://actions.google.com/sounds/v1/human_voices/laugh.ogg"></audio>

<script>
  let randomNumber = Math.trunc(Math.random() * 10 + 1);
  let attempts = 0;
  const maxAttempts = 5;

  const input = document.getElementById('guessInput');
  const message = document.getElementById('message');
  const attemptsDiv = document.getElementById('attempts');
  input.focus();

  input.addEventListener("keyup", function(event) {
    if(event.key === "Enter") checkGuess();
  });

  function playSound(id) {
    const sound = document.getElementById(id);
    sound.currentTime = 0;
    sound.play();
  }

  function checkGuess() {
    let guess = Number(input.value);

    if (isNaN(guess) || guess < 1 || guess > 10) {
      message.textContent = "❌ Enter a number between 1 and 10!";
      message.style.color = "#ffeb3b";
      return;
    }

    attempts++;

    if (guess < randomNumber) {
      message.textContent = "⬆ Too low! Try again.";
      message.style.color = "#00e5ff";
      playSound("lowSound");
      if (Math.random() < 0.3) playSound("laughSound");
    } else if (guess > randomNumber) {
      message.textContent = "⬇ Too high! Try again.";
      message.style.color = "#ff1744";
      playSound("highSound");
      if (Math.random() < 0.3) playSound("laughSound");
    } else {
      message.textContent = `🎉 Correct! The number was ${randomNumber}.`;
      message.style.color = "#00ff7f";
      playSound("winSound");
      attemptsDiv.textContent = `It took you ${attempts} attempt(s)!`;
      input.disabled = true;
      return;
    }

    if (attempts >= maxAttempts) {
      message.textContent = `💀 You lose! The number was ${randomNumber}.`;
      message.style.color = "#ffeb3b";
      playSound("laughSound");
      input.disabled = true;
    }

    attemptsDiv.textContent = `Attempts: ${attempts}/${maxAttempts}`;
    input.value = '';
    input.focus();
  }

  function restartGame() {
    randomNumber = Math.trunc(Math.random() * 10 + 1);
    attempts = 0;
    message.textContent = '';
    attemptsDiv.textContent = '';
    input.value = '';
    input.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
